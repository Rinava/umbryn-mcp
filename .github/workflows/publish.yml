name: Publish

# Publishes to PyPI and the official MCP Registry on a version tag.
#
# Prerequisites (one-time setup):
#   - Configure PyPI Trusted Publishing for this repo + this workflow
#     (https://docs.pypi.org/trusted-publishers/) so no PyPI token is needed.
#   - The registry name in server.json (io.github.rinava/phi-mcp) is authorized
#     via GitHub OIDC because it matches this repo's owner.

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write # PyPI trusted publishing AND mcp-publisher github-oidc
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync version into server.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          python - "$VERSION" <<'PY'
          import json, sys
          v = sys.argv[1]
          with open("server.json") as f:
              data = json.load(f)
          data["version"] = v
          for pkg in data.get("packages", []):
              pkg["version"] = v
          with open("server.json", "w") as f:
              json.dump(data, f, indent=2)
          PY

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
